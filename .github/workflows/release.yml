name: release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm

      - run: npm ci

      - name: Release-Version aus dem Tag ins Manifest stempeln
        run: |
          version="${GITHUB_REF_NAME#v}"
          if ! printf '%s' "$version" | grep -Eq '^[0-9]+\.[0-9]+\.[0-9]+$'; then
            echo "Tag $GITHUB_REF_NAME ist keine Semver-Version (vX.Y.Z)" >&2
            exit 1
          fi
          node -e "
            const fs = require('fs');
            const p = 'src/manifest.json';
            const m = JSON.parse(fs.readFileSync(p, 'utf8'));
            m.version = process.argv[1];
            fs.writeFileSync(p, JSON.stringify(m, null, 2) + '\n');
          " "$version"
          echo "Manifest-Version: $version"

      - name: ESLint
        run: npm run lint

      - name: Build XPI
        run: npm run build

      - name: GitHub-Release erstellen
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release create "$GITHUB_REF_NAME" dist/*.xpi --generate-notes
