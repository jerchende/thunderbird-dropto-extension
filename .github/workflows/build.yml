name: build

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm

      - run: npm ci

      - name: ESLint
        run: npm run lint

      - name: web-ext lint (informativ)
        run: npm run lint:ext
        continue-on-error: true

      - name: Build XPI
        run: npm run build

      - uses: actions/upload-artifact@v4
        with:
          name: dropto-xpi
          path: dist/*.xpi
          if-no-files-found: error
